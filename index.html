<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cogitateur Primaire — Fer-Douleur</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --term-color: #00ff41;
    --term-glow: rgba(0, 255, 65, 0.5);
    --term-dim: rgba(0, 255, 65, 0.25);
    --bg: #050505;
    --warp-opacity: 0;
    --flicker-dur: 0s;
    --glitch-skew: 0deg;
    --glitch-hue: 0deg;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ══════════ CONTENEUR CRT ══════════ */
  #crt {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: var(--bg);
    overflow: hidden;
    animation: crt-on 1.2s ease-out forwards;
  }

  @keyframes crt-on {
    0%   { filter: brightness(40); transform: scaleY(0.004); }
    15%  { filter: brightness(40); transform: scaleY(0.004); }
    40%  { filter: brightness(6); transform: scaleY(1.05); }
    60%  { filter: brightness(1.5); transform: scaleY(0.98); }
    100% { filter: brightness(1); transform: scaleY(1); }
  }

  /* ══════════ FOND WARP ══════════ */
  #warp-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 25% 45%, rgba(130, 0, 255, 0.22) 0%, transparent 50%),
      radial-gradient(ellipse at 75% 25%, rgba(220, 0, 50, 0.16) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 85%, rgba(90, 0, 190, 0.2) 0%, transparent 55%),
      radial-gradient(ellipse at 60% 55%, rgba(180, 0, 90, 0.12) 0%, transparent 40%);
    opacity: var(--warp-opacity);
    transition: opacity 4s ease-in;
    pointer-events: none;
    animation: warp-drift 12s ease-in-out infinite alternate;
  }

  @keyframes warp-drift {
    0%   { filter: hue-rotate(0deg) brightness(0.8); }
    50%  { filter: hue-rotate(25deg) brightness(1.2); }
    100% { filter: hue-rotate(-15deg) brightness(0.9); }
  }

  /* ══════════ CANVAS DE BRUIT ══════════ */
  #noise-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    opacity: 0.06;
    mix-blend-mode: overlay;
  }

  /* ══════════ LIGNE DE DÉCHIRURE ══════════ */
  #screen-tear {
    position: absolute;
    left: -15px;
    width: calc(100% + 30px);
    height: 2px;
    background: var(--term-color);
    box-shadow: 0 -1px 0 var(--term-dim), 0 1px 0 var(--term-dim), 0 0 8px var(--term-glow);
    pointer-events: none;
    opacity: 0;
    z-index: 20;
    transition: opacity 0.05s;
  }

  /* ══════════ ÉCRAN PRINCIPAL ══════════ */
  #screen {
    position: relative;
    width: 100%;
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 6vh 8vw;
    z-index: 10;
    scrollbar-width: none;
  }
  #screen::-webkit-scrollbar { display: none; }

  /* ══════════ ÉCRAN D'ACCUEIL ══════════ */
  #start-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 2vh;
    color: var(--term-color);
    text-shadow: 0 0 10px var(--term-glow);
  }

  .start-icon {
    font-size: 3rem;
    opacity: 0.5;
    margin-bottom: 1rem;
    animation: pulse-icon 3s ease-in-out infinite;
  }
  @keyframes pulse-icon {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.05); }
  }

  .start-text {
    font-size: clamp(1rem, 2.5vw, 1.6rem);
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  .start-hint {
    font-size: clamp(0.7rem, 1.5vw, 0.9rem);
    letter-spacing: 0.15em;
    opacity: 0.6;
    animation: blink 1.2s step-end infinite;
  }

  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  /* ══════════ TERMINAL ══════════ */
  .terminal-line {
    color: var(--term-color);
    text-shadow: 0 0 6px var(--term-glow);
    font-size: clamp(0.7rem, 1.4vw, 0.95rem);
    line-height: 1.8;
    white-space: pre-wrap;
    word-break: break-all;
    transition: color 2s, text-shadow 2s;
  }

  .terminal-line.warning {
    color: #ffaa00;
    text-shadow: 0 0 8px rgba(255, 170, 0, 0.6);
  }

  .terminal-line.error {
    color: #ff4400;
    text-shadow: 0 0 10px rgba(255, 68, 0, 0.7);
  }

  .terminal-line.corrupted {
    color: #ff0040;
    text-shadow: -2px 0 rgba(0, 255, 255, 0.5), 2px 0 rgba(200, 0, 255, 0.5), 0 0 12px rgba(255, 0, 64, 0.8);
  }

  .terminal-line.whisper {
    color: #c060ff;
    text-shadow: 0 0 15px rgba(180, 60, 255, 0.6), 0 0 30px rgba(180, 60, 255, 0.3);
    font-style: italic;
  }

  .terminal-line.glitch-scramble {
    animation: scramble-text 0.15s steps(1) infinite;
  }

  @keyframes scramble-text {
    0%   { transform: translate(0); filter: none; }
    20%  { transform: translate(-3px, 1px); filter: hue-rotate(90deg); }
    40%  { transform: translate(2px, -1px); }
    60%  { transform: translate(-1px, 0); filter: hue-rotate(180deg); }
    80%  { transform: translate(3px, 1px); }
    100% { transform: translate(0); filter: none; }
  }

  /* ══════════ CURSEUR ══════════ */
  #cursor {
    color: var(--term-color);
    text-shadow: 0 0 8px var(--term-glow);
    animation: blink 0.9s step-end infinite;
    font-size: clamp(0.7rem, 1.4vw, 0.95rem);
    transition: color 2s, text-shadow 2s;
  }
  #cursor.corrupted {
    animation: glitch-cursor 0.25s step-end infinite;
    color: #ff0040;
    text-shadow: -1px 0 rgba(0,255,255,0.4), 1px 0 rgba(200,0,255,0.4);
  }
  @keyframes glitch-cursor {
    0%   { opacity: 1; }
    15%  { opacity: 0; }
    20%  { opacity: 0.6; }
    40%  { opacity: 1; }
    55%  { opacity: 0; }
    65%  { opacity: 0.3; }
    80%  { opacity: 1; }
    90%  { opacity: 0; }
    100% { opacity: 1; }
  }

  /* ══════════ SCANLINES ══════════ */
  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.15) 2px,
      rgba(0, 0, 0, 0.15) 4px
    );
    pointer-events: none;
    z-index: 30;
  }

  /* ══════════ VIGNETTE ══════════ */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 31;
  }

  /* ══════════ REFLET D'ÉCRAN ══════════ */
  .screen-reflection {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      165deg,
      rgba(255,255,255,0.03) 0%,
      transparent 40%,
      transparent 60%,
      rgba(255,255,255,0.01) 100%
    );
    pointer-events: none;
    z-index: 32;
  }

  /* ══════════ FLICKER D'ÉCRAN ══════════ */
  .flicker-overlay {
    position: absolute;
    inset: 0;
    background: rgba(var(--term-color), 0.03);
    pointer-events: none;
    z-index: 25;
    opacity: 0;
  }

  #crt.flickering .flicker-overlay {
    animation: screen-flicker var(--flicker-dur) linear infinite;
  }

  @keyframes screen-flicker {
    0%   { opacity: 0; }
    3%   { opacity: 0.8; background: rgba(255,255,255,0.04); }
    4%   { opacity: 0; }
    8%   { opacity: 0.5; }
    9%   { opacity: 0; }
    50%  { opacity: 0; }
    52%  { opacity: 0.3; background: rgba(255,0,60,0.03); }
    53%  { opacity: 0; }
    100% { opacity: 0; }
  }

  /* ══════════ INVERSION FLASH ══════════ */
  #crt.invert-flash {
    animation: invert-glitch 0.12s steps(2) forwards;
  }
  @keyframes invert-glitch {
    0%   { filter: invert(1) brightness(3); }
    50%  { filter: invert(0) brightness(1); }
    100% { filter: invert(0) brightness(1); }
  }

  /* ══════════ BOUTON REJOUER ══════════ */
  #replay-btn {
    position: fixed;
    bottom: 2vh;
    right: 2vw;
    z-index: 50;
    background: rgba(255, 0, 64, 0.1);
    border: 1px solid rgba(255, 0, 64, 0.3);
    color: rgba(255, 0, 64, 0.6);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    padding: 0.5rem 1rem;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.3s;
    display: none;
  }
  #replay-btn:hover {
    background: rgba(255, 0, 64, 0.2);
    border-color: rgba(255, 0, 64, 0.6);
    color: rgba(255, 0, 64, 0.9);
    text-shadow: 0 0 8px rgba(255, 0, 64, 0.5);
  }

  .hidden { display: none !important; }

  /* ══════════ RÉDUCTION DE MOUVEMENT ══════════ */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* ══════════ RESPONSIVE ══════════ */
  @media (max-width: 640px) {
    #screen { padding: 4vh 5vw; }
  }
</style>
</head>

  // ── Générateur de bruit (canvas) ──
  function initNoise() {
    noiseCtx = noiseCanvas.getContext('2d');
    resizeNoise();
    window.addEventListener('resize', resizeNoise);
  }

  function resizeNoise() {
    // Résolution basse pour la performance
    noiseW = Math.floor(window.innerWidth / 4);
    noiseH = Math.floor(window.innerHeight / 4);
    noiseCanvas.width = noiseW;
    noiseCanvas.height = noiseH;
  }

  function renderNoise() {
    const imageData = noiseCtx.createImageData(noiseW, noiseH);
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
      const v = Math.random() * 255;
      data[i] = v;
      data[i + 1] = v;
      data[i + 2] = v;
      data[i + 3] = 255;
    }
    noiseCtx.putImageData(imageData, 0, 0);
  }

  function startNoise(fps) {
    const interval = Math.max(33, Math.floor(1000 / fps));
    noiseInterval = setInterval(renderNoise, interval);
  }

  function stopNoise() {
    clearInterval(noiseInterval);
    noiseInterval = null;
  }

  // ── Effets de glitch ──
  function triggerScreenTear() {
    const y = Math.random() * 100;
    const dx = (Math.random() - 0.5) * 30;
    screenTear.style.top = y + '%';
    screenTear.style.transform = `translateX(${dx}px)`;
    screenTear.style.opacity = '0.8';
    setTimeout(() => { screenTear.style.opacity = '0'; }, 80 + Math.random() * 120);
  }

  function triggerInvertFlash() {
    crt.classList.add('invert-flash');
    setTimeout(() => crt.classList.remove('invert-flash'), 150);
  }

  function triggerBrightnessFlash() {
    crt.style.filter = 'brightness(4)';
    setTimeout(() => { crt.style.filter = ''; }, 60);
  }

  // ── Mise à jour de la phase (couleurs, intensité) ──

    if (phase === currentPhase) return;
    currentPhase = phase;

    switch (phase) {
      case 1:
      case 2:
        root.style.setProperty('--term-color', '#00ff41');
        root.style.setProperty('--term-glow', 'rgba(0, 255, 65, 0.5)');
        root.style.setProperty('--term-dim', 'rgba(0, 255, 65, 0.25)');
        root.style.setProperty('--warp-opacity', '0');
        root.style.setProperty('--flicker-dur', '0s');
        crt.classList.remove('flickering');
        cursor.classList.remove('corrupted');
        noiseCanvas.style.opacity = '0.04';
        break;

      case 3:
        root.style.setProperty('--term-color', '#ffaa00');
        root.style.setProperty('--term-glow', 'rgba(255, 170, 0, 0.5)');
        root.style.setProperty('--term-dim', 'rgba(255, 170, 0, 0.25)');
        root.style.setProperty('--warp-opacity', '0.15');
        root.style.setProperty('--flicker-dur', '8s');
        crt.classList.add('flickering');
        noiseCanvas.style.opacity = '0.06';
        // Léger glitch périodique
        glitchIntervals.push(setInterval(() => {
          if (Math.random() < 0.4) triggerScreenTear();
        }, 3000));
        break;

      case 4:
        root.style.setProperty('--term-color', '#ff5500');
        root.style.setProperty('--term-glow', 'rgba(255, 85, 0, 0.6)');
        root.style.setProperty('--term-dim', 'rgba(255, 85, 0, 0.3)');
        root.style.setProperty('--warp-opacity', '0.35');
        root.style.setProperty('--flicker-dur', '4s');
        noiseCanvas.style.opacity = '0.08';
        // Glitch plus fréquent
        glitchIntervals.push(setInterval(() => {
          if (Math.random() < 0.6) triggerScreenTear();
        }, 1500));
        glitchIntervals.push(setInterval(() => {
          if (Math.random() < 0.3) triggerBrightnessFlash();
        }, 4000));
        break;

      case 5:
        root.style.setProperty('--term-color', '#ff0040');
        root.style.setProperty('--term-glow', 'rgba(255, 0, 64, 0.7)');
        root.style.setProperty('--term-dim', 'rgba(255, 0, 64, 0.35)');
        root.style.setProperty('--warp-opacity', '0.6');
        root.style.setProperty('--flicker-dur', '2s');
        cursor.classList.add('corrupted');
        noiseCanvas.style.opacity = '0.12';
        // Glitch intense
        glitchIntervals.push(setInterval(() => {
          triggerScreenTear();
          if (Math.random() < 0.3) {
            setTimeout(triggerScreenTear, 50 + Math.random() * 100);
          }
        }, 800));
        glitchIntervals.push(setInterval(() => {
          if (Math.random() < 0.5) triggerBrightnessFlash();
        }, 2000));
        startNoise(20); // Bruit plus rapide
        break;

      case 6:
        root.style.setProperty('--warp-opacity', '0.75');
        root.style.setProperty('--flicker-dur', '3s');
        noiseCanvas.style.opacity = '0.1';
        // Glitch soutenu mais un peu plus calme — l'horreur est dans le silence
        glitchIntervals.push(setInterval(() => {
          if (Math.random() < 0.4) triggerScreenTear();
        }, 2000));
        break;
    }
  }

  // ── Moteur de frappe ──
  function delay(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  function scrollToBottom() {
    const screen = document.getElementById('screen');
    screen.scrollTop = screen.scrollHeight;
  }

  function randomGlitchChar() {
    return GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)];
  }

  async function typeLine(lineData) {
    const { text, speed = 20, style, phase, scramble, event } = lineData;

    // Gérer les événements spéciaux
    if (event === 'flash') {
      triggerBrightnessFlash();
      triggerScreenTear();
      await delay(300);
    }
    if (event === 'invert') {
      triggerInvertFlash();
      await delay(400);
    }

    // Ligne vide = pause
    if (text === '') {
      await delay(500);
      output.appendChild(document.createElement('br'));
      scrollToBottom();
      return;
    }

    // Mettre à jour la phase
    setPhase(phase);

    // Créer l'élément de ligne
    const span = document.createElement('span');
    span.className = 'terminal-line';
    if (style) span.classList.add(style);
    if (scramble) span.classList.add('glitch-scramble');
    output.appendChild(span);

    // Frappe caractère par caractère
    for (let i = 0; i < text.length; i++) {
      const char = text[i];

      // Effet de bégaiement pendant les phases de glitch
      if (phase >= 4 && Math.random() < 0.12) {
        // Afficher un mauvais caractère
        span.textContent += randomGlitchChar();
        scrollToBottom();
        await delay(speed * 2.5 + Math.random() * speed * 2);
        // Le retirer
        span.textContent = span.textContent.slice(0, -1);
        await delay(speed * 1.5);
      }

      // Micro-pause aléatoire pour le rythme organique
      if (Math.random() < 0.05) {
        await delay(speed * 3);
      }

      span.textContent += char;
      scrollToBottom();
      await delay(speed + Math.random() * speed * 0.4);
    }

    // Saut de ligne final
    output.appendChild(document.createElement('br'));
    scrollToBottom();
  }

  // ── Séquence post-fin : glitches ambiants ──
  function startPostSequence() {
    // Glitches occasionnels pour montrer que le cogitateur est encore "là"
    postGlitchInterval = setInterval(() => {
      if (Math.random() < 0.3) {
        triggerScreenTear();
      }
      if (Math.random() < 0.08) {
        triggerInvertFlash();
        setTimeout(triggerBrightnessFlash, 200);
      }
    }, 4000);

    // Occasionnellement, faire clignoter une ligne existante
    setInterval(() => {
      if (Math.random() < 0.2) {
        const lines = output.querySelectorAll('.terminal-line.corrupted, .terminal-line.whisper');
        if (lines.length > 0) {
          const target = lines[Math.floor(Math.random() * lines.length)];
          target.style.opacity = '0';
          setTimeout(() => { target.style.opacity = '1'; }, 80);
          setTimeout(() => { target.style.opacity = '0.2'; }, 160);
          setTimeout(() => { target.style.opacity = '1'; }, 240);
        }
      }
    }, 5000);

    // Afficher le bouton rejouer
    replayBtn.style.display = 'block';
  }

  // ── Nettoyage complet ──
  function cleanup() {
    stopNoise();
    glitchIntervals.forEach(clearInterval);
    glitchIntervals = [];
    if (postGlitchInterval) { clearInterval(postGlitchInterval); postGlitchInterval = null; }
    output.innerHTML = '';
    currentPhase = 0;
    crt.classList.remove('flickering', 'invert-flash');
    crt.style.filter = '';
    cursor.classList.remove('corrupted');
    replayBtn.style.display = 'none';
    setPhase(1); // Réinitialiser les variables CSS
    root.style.setProperty('--term-color', '#00ff41');
    root.style.setProperty('--term-glow', 'rgba(0, 255, 65, 0.5)');
    root.style.setProperty('--term-dim', 'rgba(0, 255, 65, 0.25)');
    root.style.setProperty('--warp-opacity', '0');
    root.style.setProperty('--flicker-dur', '0s');
    noiseCanvas.style.opacity = '0.04';
  }

  // ── Lancement de la séquence complète ──
  async function startSequence() {
    if (isRunning) return;
    isRunning = true;
    cleanup();

    // Transition écran d'accueil → terminal
    startScreen.classList.add('hidden');
    terminal.classList.remove('hidden');
    replayBtn.style.display = 'none';

    // Démarrer le bruit
    startNoise(12);

    // Lancer chaque ligne séquentiellement
    for (const line of SEQUENCE) {
      if (!isRunning) break; // Permet d'interrompre
      await typeLine(line);
    }

    // Séquence terminée — mode spectateur
    startPostSequence();
    isRunning = false;
  }

  // ── Rejouer ──
  function replay() {
    if (isRunning) return;
    isRunning = false; // Forcer l'arrêt de la séquence en cours
    setTimeout(() => {
      cleanup();
      terminal.classList.add('hidden');
      startScreen.classList.remove('hidden');
      // Re-lancer l'animation CRT
      crt.style.animation = 'none';
      crt.offsetHeight; // Force reflow
      crt.style.animation = '';
    }, 100);
  }

  // ── Événements ──
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      if (!terminal.classList.contains('hidden')) return;
      startSequence();
    }
  });

  startScreen.addEventListener('click', () => {
    if (!terminal.classList.contains('hidden')) return;
    startSequence();
  });

  replayBtn.addEventListener('click', replay);

  // ── Initialisation ──
  initNoise();
  renderNoise(); // Première frame de bruit
</script>
</body>
