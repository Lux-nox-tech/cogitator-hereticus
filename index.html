  {text:'[NOTE INTERNE \u2014 CAPITAINE VOSS \u2014 NON TRANSMISE]',speed:15,style:'dim'},{text:'Trois mois. Trois mois que le Conclave de Scythia a ordonn\u00E9 cette mission.',speed:22,style:'dim'},{text:'Aucun vaisseau de retour depuis cette zone. Aucun signal. Rien.',speed:22,style:'dim'},{text:'Mon \u00E9quipage est compos\u00E9 de soldats, de technopr\u00EAtres, d\'officiers',speed:22,style:'dim'},{text:'qui ont tous un point commun : ils ont d\u00E9plu \u00E0 quelqu\'un d\'important.',speed:22,style:'dim'},{text:'Moi y compris. Je sais pourquoi nous sommes l\u00E0. Ils le savent aussi.',speed:22,style:'dim'},{text:'Mais je suis capitaine. Mon devoir est clair. J\'ex\u00E9cute.',speed:22,style:'dim'},
  {text:'',speed:15},{text:'> SAUT WARP INITI\u00C9 \u2014 COORDONN\u00C9ES VERROUILL\u00C9ES',speed:10,style:'system'},{text:'> DUR\u00C9E ESTIM\u00C9E : 7 jours standard immat\u00E9riel',speed:10,style:'system'},{text:'> BOUCLIERS GUARDE-FOULE D\u00C9PLOY\u00C9S',speed:10,style:'system'},{text:'',speed:15},

  {text:'Saut r\u00E9ussi. Transit stable. L\'\u00E9quipage est tendu mais disciplin\u00E9.',speed:20},{text:'Le Technopr\u00EAtre Varn signale des \u00AB \u00E9chos r\u00E9siduels \u00BB sur l\'auspex,',speed:20},{text:'secteur 7-Gamma. Statique warp classique. Rien d\'inqui\u00E9tant.',speed:20},{text:'J\'ai ordonn\u00E9 de ne pas perdre de temps avec les anomalies mineures.',speed:20},{text:'Plus vite nous terminons ce relev\u00E9, plus vite nous rentrons.',speed:20},{text:'Si nous rentrons.',speed:35},{text:'',speed:15},
  {text:LL,speed:5,style:'log-header'},{text:'  JOURNAL DU CAPITAINE \u2014 JOUR 3 DE TRANSIT WARP',speed:10,style:'log-header'},{text:LL,speed:5,style:'log-header'},{text:'',speed:8},

  {text:'Rassemblements non autoris\u00E9s dans les soutes inf\u00E9rieures.',speed:20},{text:'Le Commissaire Zenkel a enqu\u00EAet\u00E9. N\'a rien trouv\u00E9.',speed:20},{text:'Il a dit que l\'\u00E9quipage semblait \u00AB inhabituellement d\u00E9vot \u00BB.',speed:22},{text:'Je lui ai demand\u00E9 ce qu\'il voulait dire.',speed:22},{text:'Il a dit qu\'ils priaient. Tous. Dans la m\u00EAme direction.',speed:25},{text:'Vers l\'avant du vaisseau. Vers l\u00E0 o\u00F9 nous allons.',speed:30},{text:'J\'ai dit de surveiller.',speed:35},{text:'',speed:15},

/* Scroll le container LUI-MEME si il a overflow, plus son parent */
function autoScroll(el){
  if(el.scrollHeight>el.clientHeight) el.scrollTop=el.scrollHeight;
  if(el.parentElement&&el.parentElement.scrollHeight>el.parentElement.clientHeight) el.parentElement.scrollTop=el.parentElement.scrollHeight;
}

function typeLine(container,text,speed,styleClass,scramble){
  if(typingAbort)return Promise.resolve();
  if(!text||text===''){var br=document.createElement('div');br.innerHTML='&nbsp;';container.appendChild(br);autoScroll(container);return Promise.resolve()}
  var line=document.createElement('div');line.className='t-line';if(styleClass)line.classList.add(styleClass);if(scramble)line.classList.add('scramble');container.appendChild(line);
  var chars=text.split(''),idx=0,spd=speed||10;
  return new Promise(function(resolve){
    (function nxt(){
      if(typingAbort){resolve();return}
      if(idx<chars.length){line.textContent+=chars[idx];idx++;autoScroll(container);setTimeout(nxt,spd)}
      else{if(scramble){setTimeout(function(){line.classList.remove('scramble');resolve()},200)}else resolve()}
    })();
  });
}

function typeSequence(container,seq,pf){
  var i=0;
  (function nxt(){
    if(typingAbort)return;
    if(i>=seq.length)return;
    var item=seq[i];i++;
    if(pf&&item.phase!==undefined&&item.phase!==pf)return nxt();
    if(item.event==='flash'){doFlash();return nxt()}
    if(item.event==='invert'){doInvert();return nxt()}
    typeLine(container,item.text,item.speed||10,item.style,item.scramble).then(function(){sleep(Math.max(1,(item.speed||10)*0.3)).then(nxt)});
  })();
}

function initArchives(){var c=document.getElementById('archives-output');c.innerHTML='';var i=0;(function nx(){if(typingAbort)return;if(i===0){typeLine(c,LL,6,'system').then(nx);i++;return}if(i===1){typeLine(c,'  ARCHIVES DU COGITATEUR \u2014 FER-DOULEUR',12,'system').then(nx);i++;return}if(i===2){typeLine(c,'  ACC\u00C8S : TECHNOPR\u00C8TRE \u2014 NIVEAU ROUGE',12,'system').then(nx);i++;return}if(i===3){typeLine(c,LL,6,'system').then(nx);i++;return}var fi=i-4;if(fi<ARCHIVE_FILES.length){var f=ARCHIVE_FILES[fi],en=document.createElement('div');en.className='file-entry';var nm=document.createElement('span');nm.className='file-name';nm.textContent=f.name+'  ['+f.size+']';var st=document.createElement('span');st.className='file-status '+f.status;st.textContent=f.status.toUpperCase();en.appendChild(nm);en.appendChild(st);c.appendChild(en);autoScroll(c);i++;setTimeout(nx,rand(60,180));return}if(fi===ARCHIVE_FILES.length){typeLine(c,'',10).then(nx);i++;return}if(fi===ARCHIVE_FILES.length+1){var ac=ARCHIVE_FILES.filter(function(f){return f.status==='anomaly'||f.status==='sealed'}).length;typeLine(c,'\u26A0 '+ARCHIVE_FILES.length+' fichiers. '+ac+' requi\u00E8rent une attention imm\u00E9diate.',12,'warning').then(nx);i++;return}if(fi===ARCHIVE_FILES.length+2){typeLine(c,'\u25B8 Fichiers scell\u00E9s : acc\u00E8s r\u00E9serv\u00E9 Inquisition.',12,'system').then(nx);i++;return}if(fi===ARCHIVE_FILES.length+3){typeLine(c,'\u25B8 Fichiers de taille \u00AB \u221E \u00BB ou \u00AB ??? \u00BB : non mesurable.',12,'system').then(function(){if(!typingAbort){archiveGlitchInterval=setInterval(function(){var es=c.querySelectorAll('.file-entry');if(es.length>0&&Math.random()<0.2){var t=pick(es);t.classList.add('glitch-flash');setTimeout(function(){t.classList.remove('glitch-flash')},rand(60,150))}if(Math.random()<0.06)doScreenTear()},2500);startGlitch('ar',5000,10000)}});return}})()}

function initCarte(){var c=document.getElementById('carte-output');c.innerHTML='';var s=0;(function nx(){if(typingAbort)return;if(s===0){typeLine(c,'CARTE WARP \u2014 ABORDS DU VORTEX HURLANT',8,'system').then(nx);s++;return}if(s===1){typeLine(c,'RELEV\u00C9 COGITATEUR FER-DOULEUR \u2014 DERNI\u00C8RE TRANSMISSION',10,'system').then(nx);s++;return}if(s===2){typeLine(c,LL,5,'system').then(nx);s++;return}if(s===3){var g=document.createElement('div');g.className='warp-grid';var r=0;(function dr(){if(typingAbort||r>=CARTE_GRID.length){s++;nx();return}var ln=document.createElement('div');ln.textContent=CARTE_GRID[r];g.appendChild(ln);c.appendChild(g);autoScroll(c);r++;setTimeout(dr,30)})();return}if(s===4){typeLine(c,'',8).then(nx);s++;return}if(s===5){typeLine(c,'  L\u00C9GENDE',10,'log-header').then(nx);s++;return}var lg=['\u25CB \u2014 Monde imp\u00E9rial / Station','\u25C8 \u2014 Phare astral','\u2588 \u2014 Zone de flux warp anomale','\u250C\u2500\u2500\u2510 \u2014 Route marchande standard','\u2500\u2500\u2500\u253C\u2500\u2500\u2500 \u2014 Ligne sectorielle'];var li=s-6;if(li<lg.length){typeLine(c,'  '+lg[li],10,'system').then(nx);s++;return}if(s===6+lg.length){typeLine(c,'',8).then(nx);s++;return}if(s===7+lg.length){typeLine(c,'  NOTES DU COGITATEUR',10,'warning').then(nx);s++;return}var nt=['\u26A0 La zone de flux anomale s\'\u00E9tend depuis le dernier relev\u00E9.','\u26A0 Les coordonn\u00E9es de la Fid\u00E9lit\u00E9 Imp\u00E9riale ne correspondent plus \u00E0 aucun point fixe.','\u26A0 Quelque chose bouge dans la zone. Pas un vaisseau. Quelque chose d\'autre.','\u26A0 La carte se met \u00E0 jour seule. Les modifications ne sont pas de mon fait.'];var ni=s-(8+lg.length);if(ni<nt.length){typeLine(c,'  '+nt[ni],12,'warning').then(nx);s++;return}if(!typingAbort){carteGlitchInterval=setInterval(function(){var gl=c.querySelectorAll('.warp-grid div');if(gl.length>0&&Math.random()<0.15){var t=pick(gl),o=t.textContent,ix=o.indexOf('\u2588');if(ix>=0){var co=o;for(var j=0;j<co.length;j++)if(co[j]==='\u2588'&&Math.random()<0.3)co=co.substring(0,j)+pick(GLITCH_CHARS)+co.substring(j+1);t.textContent=co;setTimeout(function(){if(!typingAbort)t.textContent=o},rand(100,300))}}if(Math.random()<0.05)doScreenTear()},3000);startGlitch('ca',6000,12000)}})()}

function initTransmission(){var c=document.getElementById('transmission-output');c.innerHTML='';setTermColor(false);typeSequence(c,TRANS_SEQ);setTimeout(function(){if(typingAbort)return;transmissionDone=true;setTermColor(true);root.style.setProperty('--warp-opacity','0.3');startGlitch('tr',1500,4000);transPostInterval=setInterval(function(){if(Math.random()<0.2)doScreenTear();if(Math.random()<0.1)doFlash();if(Math.random()<0.04)doInvert();var ls=c.querySelectorAll('.t-line');if(ls.length>0&&Math.random()<0.1){var t=pick(ls),o=t.textContent;if(o.length>3){t.textContent=glitchStr(Math.min(o.length,8))+o.substring(8);setTimeout(function(){if(!typingAbort)t.textContent=o},rand(60,200))}}},2500)},200000)}

function mainInit(){try{crt=document.getElementById('crt');startScreen=document.getElementById('start-screen');terminal=document.getElementById('terminal');output=document.getElementById('output');cursorEl=document.getElementById('cursor');noiseCanvas=document.getElementById('noise-canvas');screenTear=document.getElementById('screen-tear');navBar=document.getElementById('nav-bar');root=document.documentElement;initNoise();setupNav();try{bootCompleted=localStorage.getItem('cog_boot_done')==='1'}catch(e){bootCompleted=false}document.addEventListener('keydown',function(e){if(e.key==='Enter'&&!bootCompleted&&!isRunning)startBoot()});if(bootCompleted){navBar.classList.add('visible');startScreen.classList.add('hidden');terminal.classList.remove('hidden');terminal.style.display='flex';typeSequence(output,BOOT_SEQUENCE)}}catch(e){console.error('Init:',e)}}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',mainInit);else mainInit();
</script>
