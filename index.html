/* ===== UTILITAIRES ===== */
function sleep(ms){return new Promise(function(r){setTimeout(r,ms)})}
function rand(min,max){return Math.random()*(max-min)+min}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function glitchStr(len){var s='';for(var i=0;i<len;i++)s+=pick(GLITCH_CHARS);return s}

/* ===== BRUIT CANVAS ===== */
function initNoise(){
  noiseCtx=noiseCanvas.getContext('2d');
  function resize(){
    noiseW=noiseCanvas.width=window.innerWidth;
    noiseH=noiseCanvas.height=window.innerHeight;
  }
  resize();
  window.addEventListener('resize',resize);
  (function draw(){
    var img=noiseCtx.createImageData(noiseW,noiseH);
    var d=img.data;
    for(var i=0;i<d.length;i+=4){
      var v=Math.random()*255;
      d[i]=d[i+1]=d[i+2]=v;d[i+3]=255;
    }
    noiseCtx.putImageData(img,0,0);
    requestAnimationFrame(draw);
  })();
}

/* ===== EFFETS DE GLITCH ===== */
function doScreenTear(){
  screenTear.style.top=rand(5,95)+'%';
  screenTear.style.opacity='1';
  setTimeout(function(){screenTear.style.opacity='0'},rand(40,120));
}
function doFlash(){
  crt.classList.add('flickering');
  root.style.setProperty('--flicker-dur','0.4s');
  setTimeout(function(){
    crt.classList.remove('flickering');
    root.style.setProperty('--flicker-dur','0s');
  },400);
}
function doInvert(){
  crt.classList.add('invert-flash');
  setTimeout(function(){crt.classList.remove('invert-flash')},120);
}
function startGlitch(id,min,max){
  var iv=setInterval(function(){doScreenTear()},rand(min,max));
  glitchIntervals.push({id:id,interval:iv});
  return iv;
}
function stopGlitch(id){
  for(var i=glitchIntervals.length-1;i>=0;i--){
    if(glitchIntervals[i].id===id){clearInterval(glitchIntervals[i].interval);glitchIntervals.splice(i,1)}
  }
}
function clearAllGlitches(){
  for(var i=0;i<glitchIntervals.length;i++)clearInterval(glitchIntervals[i].interval);
  glitchIntervals=[];
  if(postGlitchInterval){clearInterval(postGlitchInterval);postGlitchInterval=null}
  if(archiveGlitchInterval){clearInterval(archiveGlitchInterval);archiveGlitchInterval=null}
  if(carteGlitchInterval){clearInterval(carteGlitchInterval);carteGlitchInterval=null}
  if(transPostInterval){clearInterval(transPostInterval);transPostInterval=null}
  if(machinePostInterval){clearInterval(machinePostInterval);machinePostInterval=null}
  root.style.setProperty('--warp-opacity','0');
  crt.classList.remove('flickering');
  root.style.setProperty('--flicker-dur','0s');
}

  }
}

/* ===== EFFET DE FRAPPE ===== */
async function typeLine(container,text,speed,styleClass,scramble){
  if(typingAbort)return;
  if(!text||text===''){
    var br=document.createElement('div');br.innerHTML='&nbsp;';container.appendChild(br);
    container.parentElement.scrollTop=container.parentElement.scrollHeight;
    return;
  }
  var line=document.createElement('div');
  line.className='t-line';
  if(styleClass)line.classList.add(styleClass);
  if(scramble)line.classList.add('scramble');
  container.appendChild(line);
  var chars=text.split('');
  for(var i=0;i<chars.length;i++){
    if(typingAbort)return;
    line.textContent+=chars[i];
    container.parentElement.scrollTop=container.parentElement.scrollHeight;
    await sleep(speed||10);
  }
  if(scramble){
    await sleep(200);
    line.classList.remove('scramble');
  }
}

async function typeSequence(container,sequence,phaseFilter){
  for(var i=0;i<sequence.length;i++){
    if(typingAbort)return;
    var item=sequence[i];
    if(phaseFilter&&item.phase!==undefined&&item.phase!==phaseFilter)continue;
    if(item.event==='flash')doFlash();
    else if(item.event==='invert')doInvert();
    await typeLine(container,item.text,item.speed,item.style,item.scramble);
    await sleep(item.speed?item.speed*0.3:5);
  }
}

/* ===== NAVIGATION ===== */
function setupNav(){
  navBar.innerHTML='';
  for(var key in PAGES){
    (function(k){
      var link=document.createElement('div');
      link.className='nav-link';
      link.setAttribute('role','button');
      link.setAttribute('tabindex','0');
      link.setAttribute('aria-label',PAGES[k].label);
      link.innerHTML='<i class="fas '+PAGES[k].icon+'"></i> '+PAGES[k].label;
      link.addEventListener('click',function(){switchPage(k)});
      link.addEventListener('keydown',function(e){if(e.key==='Enter')switchPage(k)});
      link.dataset.page=k;
      navBar.appendChild(link);
    })(key);
  }
}

function switchPage(name){
  if(!PAGES[name])return;
  if(!bootCompleted&&name!=='accueil')return;
  typingAbort=true;
  clearAllGlitches();
  setTermColor(false);
  currentPageName=name;
  var pages=document.querySelectorAll('.page');
  for(var i=0;i<pages.length;i++)pages[i].classList.remove('active');
  var target=document.getElementById('page-'+name);
  if(target)target.classList.add('active');
  var links=navBar.querySelectorAll('.nav-link');
  for(var i=0;i<links.length;i++){
    links[i].classList.toggle('active',links[i].dataset.page===name);
  }
  setTimeout(function(){
    typingAbort=false;
    PAGES[name].init();
  },100);
}

function initAccueil(){
  if(bootCompleted){
    startScreen.classList.add('hidden');
    terminal.classList.remove('hidden');
    output.innerHTML='';
    typeSequence(output,BOOT_SEQUENCE);
    startGlitch('post-boot',4000,8000);
    postGlitchInterval=setInterval(function(){
      if(Math.random()<0.3)doScreenTear();
      if(Math.random()<0.08)doFlash();
    },6000);
  }else{
    startScreen.classList.remove('hidden');
    terminal.classList.add('hidden');
  }
}

async function startBoot(){
  if(isRunning)return;
  isRunning=true;
  startScreen.classList.add('hidden');
  terminal.classList.remove('hidden');
  output.innerHTML='';
  navBar.classList.add('visible');
  await typeSequence(output,BOOT_SEQUENCE);
  if(!typingAbort){
    bootCompleted=true;
    localStorage.setItem('cog_boot_done','1');
    startGlitch('post-boot',4000,8000);
    postGlitchInterval=setInterval(function(){
      if(Math.random()<0.3)doScreenTear();
      if(Math.random()<0.08)doFlash();
    },6000);
  }
  isRunning=false;
}

async function initMachineSpirit(){

      var item=MACHINE_SEQ[i];
      await typeLine(cont,item.text,item.speed||10,item.style,item.scramble);
      await sleep(5);
    }
  }else{
    await typeSequence(cont,MACHINE_SEQ);
    if(!typingAbort){
      machineDone=true;
      setTermColor(true);
      root.style.setProperty('--warp-opacity','0.15');
      startGlitch('machine',2000,5000);
      machinePostInterval=setInterval(function(){
        if(Math.random()<0.15){
          var lines=cont.querySelectorAll('.t-line');
          if(lines.length>0){
            var target=pick(lines);
            var orig=target.textContent;
            target.textContent=glitchStr(orig.length);
            setTimeout(function(){
              if(!typingAbort)target.textContent=orig;
            },rand(80,200));
          }
        }
        if(Math.random()<0.1)doScreenTear();
      },3000);
    }
  }
}

  await typeLine(cont,LL,6,'system');

  await typeLine(cont,'  ACC\u00C8S : TECHNOPR\u00C8TRE \u2014 NIVEAU ROUGE',12,'system');
  await typeLine(cont,LL,6,'system');
  await sleep(100);
  for(var i=0;i<ARCHIVE_FILES.length;i++){
    if(typingAbort)return;
    var f=ARCHIVE_FILES[i];
    var entry=document.createElement('div');
    entry.className='file-entry';
    var nameEl=document.createElement('span');
    nameEl.className='file-name';
    nameEl.textContent=f.name+'  ['+f.size+']';
    var statusEl=document.createElement('span');
    statusEl.className='file-status '+f.status;
    statusEl.textContent=f.status.toUpperCase();
    entry.appendChild(nameEl);
    entry.appendChild(statusEl);
    cont.appendChild(entry);
    cont.parentElement.scrollTop=cont.parentElement.scrollHeight;
    await sleep(rand(60,180));
  }
  await sleep(200);
  await typeLine(cont,'',10);
  await typeLine(cont,'\u26A0 '+ARCHIVE_FILES.length+' fichiers r\u00E9pertori\u00E9s. '+ARCHIVE_FILES.filter(function(f){return f.status==='anomaly'||f.status==='sealed'}).length+' requi\u00E8rent une attention imm\u00E9diate.',12,'warning');
  await typeLine(cont,'\u25B8 Les fichiers scell\u00E9s ne peuvent \u00EAtre ouverts sans autorisation de l\u2019Inquisition.',12,'system');
  await typeLine(cont,'\u25B8 Les fichiers de taille \u00AB \u221E \u00BB ou \u00AB ??? \u00BB n\u2019ont pas de taille mesurable.',12,'system');
  if(!typingAbort){
    archiveGlitchInterval=setInterval(function(){
      var entries=cont.querySelectorAll('.file-entry');
      if(entries.length>0&&Math.random()<0.2){
        var target=pick(entries);
        target.classList.add('glitch-flash');
        setTimeout(function(){target.classList.remove('glitch-flash')},rand(60,150));
      }
      if(Math.random()<0.06)doScreenTear();
    },2500);
    startGlitch('archives',5000,10000);
  }
}

/* ===== PAGE CARTE ===== */
async function initCarte(){
  var cont=document.getElementById('carte-output');
  cont.innerHTML='';
  await typeLine(cont,CARTE_DATA.title,8,'system');
  await typeLine(cont,CARTE_DATA.subtitle,10,'system');
  await typeLine(cont,LL,5,'system');
  await sleep(100);
  var gridEl=document.createElement('div');
  gridEl.className='warp-grid';
  for(var i=0;i<CARTE_DATA.grid.length;i++){
    var line=document.createElement('div');
    line.textContent=CARTE_DATA.grid[i];
    gridEl.appendChild(line);
    cont.appendChild(gridEl);
    cont.parentElement.scrollTop=cont.parentElement.scrollHeight;
    await sleep(30);
  }
  await sleep(200);
  await typeLine(cont,'',8);
  await typeLine(cont,'  L\u00C9GENDE',10,'log-header');
  for(var i=0;i<CARTE_DATA.legend.length;i++){
    await typeLine(cont,'  '+CARTE_DATA.legend[i],10,'system');
  }
  await typeLine(cont,'',8);
  await typeLine(cont,'  NOTES DU COGITATEUR',10,'warning');
  for(var i=0;i<CARTE_DATA.notes.length;i++){
    await typeLine(cont,'  '+CARTE_DATA.notes[i],12,'warning');
  }
  if(!typingAbort){
    carteGlitchInterval=setInterval(function(){
      var gridLines=cont.querySelectorAll('.warp-grid div');
      if(gridLines.length>0&&Math.random()<0.15){
        var target=pick(gridLines);
        var orig=target.textContent;
        var idx=orig.indexOf('\u2588');
        if(idx>=0){
          var corrupted=orig;
          for(var j=0;j<corrupted.length;j++){
            if(corrupted[j]==='\u2588'&&Math.random()<0.3)corrupted=corrupted.substring(0,j)+pick(GLITCH_CHARS)+corrupted.substring(j+1);
          }
          target.textContent=corrupted;
          setTimeout(function(){if(!typingAbort)target.textContent=orig},rand(100,300));
        }
      }
      if(Math.random()<0.05)doScreenTear();
    },3000);
    startGlitch('carte',6000,12000);
  }
}

/* ===== PAGE TRANSMISSION ===== */
async function initTransmission(){
  var cont=document.getElementById('transmission-output');
  cont.innerHTML='';
  if(transmissionDone){
    for(var i=0;i<TRANS_SEQ.length;i++){
      var item=TRANS_SEQ[i];
      if(typingAbort)return;
      if(item.event==='flash')doFlash();
      else if(item.event==='invert')doInvert();
      await typeLine(cont,item.text,item.speed||10,item.style,item.scramble);
      await sleep(5);
    }
  }else{
    setTermColor(false);
    await typeSequence(cont,TRANS_SEQ);
    if(!typingAbort){
      transmissionDone=true;
      setTermColor(true);
      root.style.setProperty('--warp-opacity','0.3');
      startGlitch('trans',1500,4000);
      transPostInterval=setInterval(function(){
        if(Math.random()<0.2)doScreenTear();
        if(Math.random()<0.1)doFlash();
        if(Math.random()<0.04)doInvert();
        var lines=cont.querySelectorAll('.t-line');
        if(lines.length>0&&Math.random()<0.1){
          var target=pick(lines);
          var orig=target.textContent;
          if(orig.length>3){
            target.textContent=glitchStr(Math.min(orig.length,8))+orig.substring(8);
            setTimeout(function(){if(!typingAbort)target.textContent=orig},rand(60,200));
          }
        }
      },2500);
    }
  }
}

/* ===== INITIALISATION ===== */
function init(){
  initNoise();
  setupNav();
  startScreen.addEventListener('click',startBoot);
  document.addEventListener('keydown',function(e){
    if(e.key==='Enter'&&!bootCompleted&&!isRunning){startBoot()}
  });
  if(bootCompleted){
    navBar.classList.add('visible');
    startScreen.classList.add('hidden');
    terminal.classList.remove('hidden');
    typeSequence(output,BOOT_SEQUENCE);
    startGlitch('post-boot',4000,8000);
    postGlitchInterval=setInterval(function(){
      if(Math.random()<0.3)doScreenTear();
      if(Math.random()<0.08)doFlash();
    },6000);
  }
}

document.addEventListener('DOMContentLoaded',init);
</script>
