<style>
/* Reset */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background-color: #050000; /* Fond noir très profond */
    color: #ff0000;
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
    text-transform: uppercase;
    display: flex; height: 100vh; flex-direction: column;
}

/* --- LE FOND ROUGE SOMBRE DU WARP --- */
.warp-lumiere {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    /* Dégradé radial du centre (noir) vers un bordeaux/rouge très sombre sur les bords */
    background: radial-gradient(circle, rgba(5,0,0,1) 30%, rgba(20,0,0,1) 100%);
    pointer-events: none; z-index: -1;
}

/* --- LA GRILLE CRT PHYSIQUE (L'effet "grilles") --- */
.crt-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    /* Motif de grille de pixels microscopiques (Quadrillage) */
    background: 
        linear-gradient(rgba(0,0,0,0) 2px, rgba(255,0,0,0.03) 2px), /* Lignes horizontales fines */
        linear-gradient(90deg, rgba(0,0,0,0) 2px, rgba(255,0,0,0.03) 2px); /* Lignes verticales fines */
    background-size: 4px 4px; /* Taille de la grille */
    pointer-events: none; z-index: 1000;
}

/* --- LES EFFETS DE L'ÉCRAN POSSÉDÉ --- */
.glow { text-shadow: 0 0 4px #ff0000, 0 0 10px #8b0000, 0 0 20px #4d0000; }

/* Vibration constante et faible */
.jitter-strong {
    animation: jitterAnim 0.1s infinite;
}

/* GRÉSILLEMENT COMPLEXE ET FLICKER (Possession) */
.glitch-flicker {
    animation: glitchFlickerAnim 6s infinite;
}

/* Définition des animations */
@keyframes jitterAnim {
    0% { transform: translate(1px, 1px) scale(1); }
    100% { transform: translate(-1px, -1px) scale(1.001); }
}

@keyframes glitchFlickerAnim {
    /* Grésillement d'opacité normal */
    0%, 94%, 96%, 100% { opacity: 1; transform: scaleY(1) skewX(0deg); color: #ff0000; filter: blur(0px); }
    1% { opacity: 0.9; } 2% { opacity: 1; }
    
    /* FLASH ET DISTORSION DU WARP (Possession brutale) */
    95% { opacity: 0.7; transform: scaleY(1.02) skewX(0deg); color: #8b0000; filter: blur(0.5px); } /* Plus sombre */
    95.5% { transform: scaleY(0.98) skewX(20deg); color: #ffffff; filter: blur(1px); } /* Éclair blanc déformé */
}

@keyframes blinkAnim { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
.blink { animation: blinkAnim 1s infinite; }

/* Styles spécifiques à l'interface */
header { border-bottom: 3px double #ff0000; padding: 20px 10px; text-align: center; }
nav { display: flex; justify-content: center; gap: 30px; padding: 15px; border-bottom: 2px solid #ff0000; }
nav span { cursor: pointer; color: #8b0000; }
nav span:hover, nav span.active { color: #ff0000; font-weight: bold; }

/* Le contenu principal */
.content-area { flex: 1; padding: 30px; overflow-y: auto; position: relative; }
.view { display: none; } /* Par défaut, tout est caché */
.view.active { display: block; } /* Sauf la vue active */

p { font-size: 1.1em; line-height: 1.7; position: relative; }

/* Styles pour le réveil impie */
.unholy-text { color: #8b0000; font-style: italic; }
.blood { text-shadow: 0 0 10px #ff0000; }
</style>
