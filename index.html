  @keyframes page-in{from{opacity:0}to{opacity:1}}

  #start-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:2vh;color:var(--term-color);text-shadow:0 0 10px var(--term-glow);cursor:pointer}
  .start-icon{font-size:3rem;opacity:.5;margin-bottom:1rem;animation:pulse-icon 3s ease-in-out infinite}
  @keyframes pulse-icon{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.7;transform:scale(1.05)}}
  .start-text{font-size:clamp(1rem,2.5vw,1.6rem);letter-spacing:.3em;text-transform:uppercase}
  .start-hint{font-size:clamp(.7rem,1.5vw,.9rem);letter-spacing:.15em;opacity:.6;animation:blink 1.2s step-end infinite}

  .t-line.corrupted{color:#ff0040;text-shadow:-2px 0 rgba(0,255,255,.5),2px 0 rgba(200,0,255,.5),0 0 12px rgba(255,0,64,.8)}
  .t-line.whisper{color:#c060ff;text-shadow:0 0 15px rgba(180,60,255,.6),0 0 30px rgba(180,60,255,.3);font-style:italic}

function initNoise(){
  noiseCtx=noiseCanvas.getContext('2d');
  resizeNoise();
  window.addEventListener('resize',resizeNoise);
}
function resizeNoise(){
  noiseW=Math.floor(window.innerWidth/4);
  noiseH=Math.floor(window.innerHeight/4);
  noiseCanvas.width=noiseW;
  noiseCanvas.height=noiseH;
}
function renderNoise(){
  var img=noiseCtx.createImageData(noiseW,noiseH);
  var d=img.data;
  for(var i=0;i<d.length;i+=4){var v=Math.random()*255;d[i]=v;d[i+1]=v;d[i+2]=v;d[i+3]=255;}
  noiseCtx.putImageData(img,0,0);
}
function startNoise(fps){noiseInterval=setInterval(renderNoise,Math.max(33,Math.floor(1000/fps)));}
function stopNoise(){if(noiseInterval){clearInterval(noiseInterval);noiseInterval=null;}}

function triggerScreenTear(){
  var y=Math.random()*100,dx=(Math.random()-.5)*30;
  screenTear.style.top=y+'%';
  screenTear.style.transform='translateX('+dx+'px)';
  screenTear.style.opacity='0.8';
  setTimeout(function(){screenTear.style.opacity='0';},80+Math.random()*120);
}
function triggerInvertFlash(){
  crt.classList.add('invert-flash');
  setTimeout(function(){crt.classList.remove('invert-flash');},150);
}
function triggerBrightnessFlash(){
  crt.style.filter='brightness(4)';
  setTimeout(function(){crt.style.filter='';},60);
}

    case 1:case 2:
      root.style.setProperty('--term-color','#00ff41');
      root.style.setProperty('--term-glow','rgba(0,255,65,0.5)');
      root.style.setProperty('--term-dim','rgba(0,255,65,0.25)');
      root.style.setProperty('--warp-opacity','0');
      root.style.setProperty('--flicker-dur','0s');
      crt.classList.remove('flickering');
      cursorEl.classList.remove('corrupted');
      noiseCanvas.style.opacity='.04';
      break;
    case 3:
      root.style.setProperty('--term-color','#ffaa00');
      root.style.setProperty('--term-glow','rgba(255,170,0,0.5)');
      root.style.setProperty('--term-dim','rgba(255,170,0,0.25)');
      root.style.setProperty('--warp-opacity','0.15');
      root.style.setProperty('--flicker-dur','8s');
      crt.classList.add('flickering');
      noiseCanvas.style.opacity='.06';
      glitchIntervals.push(setInterval(function(){if(Math.random()<.4)triggerScreenTear();},3000));
      break;
    case 4:
      root.style.setProperty('--term-color','#ff5500');
      root.style.setProperty('--term-glow','rgba(255,85,0,0.6)');
      root.style.setProperty('--term-dim','rgba(255,85,0,0.3)');
      root.style.setProperty('--warp-opacity','0.35');
      root.style.setProperty('--flicker-dur','4s');
      noiseCanvas.style.opacity='.08';
      glitchIntervals.push(setInterval(function(){if(Math.random()<.6)triggerScreenTear();},1500));
      glitchIntervals.push(setInterval(function(){if(Math.random()<.3)triggerBrightnessFlash();},4000));
      break;
    case 5:
      root.style.setProperty('--term-color','#ff0040');
      root.style.setProperty('--term-glow','rgba(255,0,64,0.7)');
      root.style.setProperty('--term-dim','rgba(255,0,64,0.35)');
      root.style.setProperty('--warp-opacity','0.6');
      root.style.setProperty('--flicker-dur','2s');
      cursorEl.classList.add('corrupted');
      noiseCanvas.style.opacity='.12';
      glitchIntervals.push(setInterval(function(){triggerScreenTear();if(Math.random()<.3)setTimeout(triggerScreenTear,50+Math.random()*100);},800));
      glitchIntervals.push(setInterval(function(){if(Math.random()<.5)triggerBrightnessFlash();},2000));
      stopNoise();startNoise(20);
      break;
    case 6:
      root.style.setProperty('--warp-opacity','0.75');
      root.style.setProperty('--flicker-dur','3s');
      noiseCanvas.style.opacity='.1';
      glitchIntervals.push(setInterval(function(){if(Math.random()<.4)triggerScreenTear();},2000));
      break;
  }
}

function setCorruptedState(){
  root.style.setProperty('--term-color','#ff0040');
  root.style.setProperty('--term-glow','rgba(255,0,64,0.7)');
  root.style.setProperty('--term-dim','rgba(255,0,64,0.35)');
  root.style.setProperty('--warp-opacity','0.55');
  root.style.setProperty('--flicker-dur','3s');
  crt.classList.add('flickering');
  noiseCanvas.style.opacity='.08';
  cursorEl.classList.add('corrupted');
}

function wait(ms){return new Promise(function(r){setTimeout(r,ms);})}
function scrollPage(p){if(p)p.scrollTop=p.scrollHeight;}
function randomGlitchChar(){return GLITCH_CHARS[Math.floor(Math.random()*GLITCH_CHARS.length)];}

async function typeLine(targetEl,lineData){
  var text=lineData.text;
  var speed=lineData.speed||20;
  var style=lineData.style;
  var phase=lineData.phase;
  var scramble=lineData.scramble;
  var event=lineData.event;
  var pageDiv=targetEl.closest('.page');

  if(event==='flash'){triggerBrightnessFlash();triggerScreenTear();await wait(300);}
  if(event==='invert'){triggerInvertFlash();await wait(400);}

  if(text===''){await wait(500);targetEl.appendChild(document.createElement('br'));scrollPage(pageDiv);return;}
  if(phase)setPhase(phase);

  var span=document.createElement('span');
  span.className='t-line';
  if(style)span.classList.add(style);
  if(scramble)span.classList.add('scramble');
  targetEl.appendChild(span);

  for(var i=0;i<text.length;i++){
    if(typingAbort){typingAbort=false;return;}
    var ch=text[i];
    if(phase>=4&&Math.random()<.12){
      span.textContent+=randomGlitchChar();scrollPage(pageDiv);
      await wait(speed*2.5+Math.random()*speed*2);
      span.textContent=span.textContent.slice(0,-1);await wait(speed*1.5);
    }
    if(Math.random()<.05)await wait(speed*3);
    span.textContent+=ch;scrollPage(pageDiv);
    await wait(speed+Math.random()*speed*.4);
  }
  targetEl.appendChild(document.createElement('br'));scrollPage(pageDiv);
}

function cleanupGlitches(){
  stopNoise();
  glitchIntervals.forEach(clearInterval);
  glitchIntervals=[];
  if(postGlitchInterval){clearInterval(postGlitchInterval);postGlitchInterval=null;}
  if(archiveGlitchInterval){clearInterval(archiveGlitchInterval);archiveGlitchInterval=null;}
  if(carteGlitchInterval){clearInterval(carteGlitchInterval);carteGlitchInterval=null;}
}
function fullCleanup(){
  cleanupGlitches();currentPhase=0;
  crt.classList.remove('flickering','invert-flash');crt.style.filter='';
  cursorEl.classList.remove('corrupted');
  root.style.setProperty('--term-color','#00ff41');
  root.style.setProperty('--term-glow','rgba(0,255,65,0.5)');
  root.style.setProperty('--term-dim','rgba(0,255,65,0.25)');
  root.style.setProperty('--warp-opacity','0');
  root.style.setProperty('--flicker-dur','0s');
  noiseCanvas.style.opacity='.04';
}

function buildNav(){
  navBar.innerHTML='';
  var keys=Object.keys(PAGES);
  for(var i=0;i<keys.length;i++){
    var key=keys[i];
    var pg=PAGES[key];
    var link=document.createElement('div');
    link.className='nav-link';
    link.setAttribute('data-page',key);
    link.setAttribute('role','button');
    link.setAttribute('tabindex','0');
    link.innerHTML='<i class="fas '+pg.icon+'"></i> '+pg.label;
    link.addEventListener('click',function(){navigateTo(this.getAttribute('data-page'));});
    link.addEventListener('keydown',function(e){if(e.key==='Enter')navigateTo(this.getAttribute('data-page'));});
    navBar.appendChild(link);
  }
}

function showNav(){navBar.classList.add('visible');}

function updateActiveNav(){
  var links=navBar.querySelectorAll('.nav-link');
  for(var i=0;i<links.length;i++){
    if(links[i].getAttribute('data-page')===currentPageName)links[i].classList.add('active');
    else links[i].classList.remove('active');
  }
}

function navigateTo(pageName){
  if(!PAGES[pageName])return;
  if(pageName===currentPageName)return;
  typingAbort=true;cleanupGlitches();
  triggerBrightnessFlash();triggerScreenTear();
  setTimeout(function(){
    var pages=document.querySelectorAll('.page');
    for(var i=0;i<pages.length;i++)pages[i].classList.remove('active');
    if(pageName!=='accueil'){var outEl=document.getElementById(pageName+'-output');if(outEl)outEl.innerHTML='';}
    var target=document.getElementById('page-'+pageName);
    if(target)target.classList.add('active');
    currentPageName=pageName;updateActiveNav();
    if(pageName!=='accueil'){
      setCorruptedState();startNoise(10);
      glitchIntervals.push(setInterval(function(){if(Math.random()<.25)triggerScreenTear();},3000));
    }
    PAGES[pageName].init();
  },200);
}

function initAccueil(){
  if(bootCompleted){
    fullCleanup();output.innerHTML='';
    startScreen.classList.remove('hidden');
    terminal.classList.add('hidden');
    navBar.classList.remove('visible');
    startNoise(8);return;
  }
  startScreen.classList.remove('hidden');
  terminal.classList.add('hidden');
  output.innerHTML='';
  navBar.classList.remove('visible');
  startNoise(8);
}

async function startBootSequence(){
  if(isRunning)return;
  isRunning=true;
  startScreen.classList.add('hidden');
  terminal.classList.remove('hidden');
  output.innerHTML='';
  startNoise(12);
  for(var i=0;i<BOOT_SEQUENCE.length;i++){
    if(typingAbort){isRunning=false;return;}
    await typeLine(output,BOOT_SEQUENCE[i]);
  }
  bootCompleted=true;isRunning=false;
  postGlitchInterval=setInterval(function(){
    if(Math.random()<.3)triggerScreenTear();
    if(Math.random()<.08){triggerInvertFlash();setTimeout(triggerBrightnessFlash,200);}
  },4000);
  setInterval(function(){
    if(Math.random()<.2){
      var lines=output.querySelectorAll('.t-line.corrupted,.t-line.whisper');
      if(lines.length>0){
        var t=lines[Math.floor(Math.random()*lines.length)];
        t.style.opacity='0';
        setTimeout(function(){t.style.opacity='1';},80);
        setTimeout(function(){t.style.opacity='.2';},160);
        setTimeout(function(){t.style.opacity='1';},240);
      }
    }
  },5000);
  showNav();
}

document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!terminal.classList.contains('hidden')&&startScreen.classList.contains('hidden'))return;
  if(e.key==='Enter'&&currentPageName==='accueil')startBootSequence();
});
startScreen.addEventListener('click',function(){
  if(currentPageName==='accueil')startBootSequence();
});

window.addEventListener('hashchange',function(){
  var hash=window.location.hash.replace('#','');
  if(hash&&PAGES[hash]&&hash!==currentPageName)navigateTo(hash);
});

initNoise();
renderNoise();
buildNav();
currentPageName='accueil';
updateActiveNav();
initAccueil();
