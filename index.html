{text:'  ORDRE : DIRECTIVE DU CONCLAVE DE SCYTHIA \u2014 NIVEAU VIOLET',speed:10},
{text:'\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501',speed:5},{text:'',speed:10},
{text:'\u25B8 Effectif assign\u00E9 : 14\u00A0280 \u00E2mes',speed:12,style:'system'},
{text:'\u25B8 Effectif assign\u00E9 : 14\u00A0283 \u00E2mes  \u26A0',speed:8,style:'error'},

{text:'\u25B8 Destination calcul\u00E9e : Secteur-limite 77-THULE',speed:12,style:'system'},

{text:'\u25B8 Destination calcul\u00E9e : Secteur-limite 77-THULE  [CORRIG\u00C9]',speed:10,style:'warning'},{text:'',speed:8},
{text:'[NOTE INTERNE \u2014 CAPITAINE VOSS \u2014 NON TRANSMISE]',speed:15,style:'dim'},
{text:'Trois mois. Trois mois que le Conclave de Scythia a ordonn\u00E9 cette mission.',speed:22,style:'dim'},
{text:'Aucun vaisseau de retour depuis cette zone. Aucun signal. Rien.',speed:22,style:'dim'},
{text:'Mon \u00E9quipage est compos\u00E9 de soldats, de technopr\u00EAtres, d\u2019officiers',speed:22,style:'dim'},
{text:'qui ont tous un point commun : ils ont d\u00E9plu \u00E0 quelqu\u2019un d\u2019important.',speed:22,style:'dim'},
{text:'Moi y compris. Je sais pourquoi nous sommes l\u00E0. Ils le savent aussi.',speed:22,style:'dim'},
{text:'Mais je suis capitaine. Mon devoir est clair. J\u2019ex\u00E9cute.',speed:22,style:'dim'},
{text:'',speed:15},
{text:'> SAUT WARP INITI\u00C9 \u2014 COORDONN\u00C9ES VERROUILL\u00C9ES',speed:10,style:'system'},
{text:'> DUR\u00C9E ESTIM\u00C9E : 7 jours standard immat\u00E9riel',speed:10,style:'system'},
{text:'> BOUCLIERS GUARDE-FOULE D\u00C9PLOY\u00C9S',speed:10,style:'system'},{text:'',speed:15},
{text:LL,speed:5,style:'log-header'},{text:'  JOURNAL DU CAPITAINE \u2014 JOUR 1 DE TRANSIT WARP',speed:10,style:'log-header'},{text:LL,speed:5,style:'log-header'},{text:'',speed:8},
{text:'Saut r\u00E9ussi. Transit stable. L\u2019\u00E9quipage est tendu mais disciplin\u00E9.',speed:20},
{text:'Le Technopr\u00EAtre Varn signale des \u00AB \u00E9chos r\u00E9siduels \u00BB sur l\u2019auspex,',speed:20},
{text:'secteur 7-Gamma. Statique warp classique. Rien d\u2019inqui\u00E9tant.',speed:20},
{text:'J\u2019ai ordonn\u00E9 de ne pas perdre de temps avec les anomalies mineures.',speed:20},
{text:'Plus vite nous terminons ce relev\u00E9, plus vite nous rentrons.',speed:20},
{text:'Si nous rentrons.',speed:35},{text:'',speed:15},
{text:LL,speed:5,style:'log-header'},{text:'  JOURNAL DU CAPITAINE \u2014 JOUR 3 DE TRANSIT WARP',speed:10,style:'log-header'},{text:LL,speed:5,style:'log-header'},{text:'',speed:8},
{text:'La chapelle du deck 12 a \u00E9t\u00E9 trouv\u00E9e profan\u00E9e ce matin.',speed:20},
{text:'Les offrandes \u00E0 l\u2019Empereur retir\u00E9es. Les ic\u00F4nes ray\u00E9es.',speed:20},
{text:'Trois matelots du contingent Solstice identifi\u00E9s. Sanctionn\u00E9s.',speed:20},
{text:'D\u00E9tail qui me tracasse : les rayures n\u2019\u00E9taient pas du vandalisme.',speed:22},
{text:'C\u2019\u00E9tait m\u00E9thodique. Quelqu\u2019un \u00E9crivait quelque chose, puis l\u2019effa\u00E7ait.',speed:22},
{text:'Rapport class\u00E9. Personne n\u2019a pos\u00E9 de question.',speed:25},{text:'',speed:15},
{text:LL,speed:5,style:'log-header'},{text:'  JOURNAL DU CAPITAINE \u2014 JOUR 5 DE TRANSIT WARP',speed:10,style:'log-header'},{text:LL,speed:5,style:'log-header'},{text:'',speed:8},
{text:'Rassemblements non autoris\u00E9s dans les soutes inf\u00E9rieures.',speed:20},
{text:'Le Commissaire Zenkel a enqu\u00EAet\u00E9. N\u2019a rien trouv\u00E9.',speed:20},
{text:'Il a dit que l\u2019\u00E9quipage semblait \u00AB inhabituellement d\u00E9vot \u00BB.',speed:22},
{text:'Je lui ai demand\u00E9 ce qu\u2019il voulait dire.',speed:22},
{text:'Il a dit qu\u2019ils priaient. Tous. Dans la m\u00EAme direction.',speed:25},
{text:'Vers l\u2019avant du vaisseau. Vers l\u00E0 o\u00F9 nous allons.',speed:30},
{text:'J\u2019ai dit de surveiller.',speed:35},{text:'',speed:15},
{text:LL,speed:5,style:'log-header'},{text:'  JOURNAL DU CAPITAINE \u2014 JOUR 7 DE TRANSIT WARP',speed:10,style:'log-header'},{text:LL,speed:5,style:'log-header'},{text:'',speed:8},
{text:'Troisi\u00E8me mort. Matelot Thale, deck 9, pr\u00E8s du conduit plasma.',speed:20},
{text:'Le conduit \u00E9tait intact. Thale ne l\u2019\u00E9tait pas.',speed:25},
{text:'Ce qui l\u2019a tu\u00E9 a laiss\u00E9 des marques. Des empreintes.',speed:25},
{text:'Si les empreintes avaient des griffes. Et s\u2019il y en avait trop.',speed:28},
{text:'Le Technopr\u00EAtre Varn a murmur\u00E9 quelque chose en passant.',speed:22},
{text:'Je n\u2019ai pas compris. Je ne voulais pas comprendre.',speed:30},
{text:'Je n\u2019ai plus de \u00AB officiellement \u00BB.',speed:35},{text:'',speed:15},
{text:'> SORTIE WARP R\u00C9USSIE \u2014 ABORDS DU VORTEX HURLANT',speed:10,style:'system'},
{text:'> POSITION : LIMITE SECTEUR CALIXIS / \u00C9TENDUES KORONUS',speed:10,style:'system'},
{text:'> D\u00C9CHIRURE WARP NON VISIBLE \u2014 PROTOCOLE D\u2019ABORD IMPOSSIBILIT\u00C9',speed:10,style:'system'},{text:'',speed:10},
{text:'D\u00E9but des op\u00E9rations de relev\u00E9. D\u00E9ploiement des sondes.',speed:18},
{text:'Premiers r\u00E9sultats dans les deux heures.',speed:18},{text:'',speed:10},
{text:'\u25B8 V\u00C9RIFICATION SYST\u00C8ME D\u2019ARMEMENT...',speed:20,style:'system'},
{text:'\u25B8 Lance-missiles tribord : OP\u00C9RATIONNEL',speed:15,style:'system'},

{text:'\u25B8 Canon macro avant : HORS SERVICE \u2014 73% OP\u00C9RATIONNEL',speed:15,style:'error'},{text:'',speed:10},
{text:'[SOUPIR DU CAPITAINE \u2014 ENREGISTR\u00C9 PAR LE COGITATEUR]',speed:25,style:'dim'},
{text:'Bien s\u00FBr. \u00C9videmment. On nous envoie dans le territoire le plus dangereux',speed:20,style:'dim'},
{text:'de la galaxie avec un canon macro qui ne fonctionne pas.',speed:20,style:'dim'},
{text:'Je n\u2019ai m\u00EAme pas besoin de demander pourquoi. Je sais pourquoi.',speed:22,style:'dim'},{text:'',speed:10},

function initNoise(){noiseCtx=noiseCanvas.getContext('2d');resizeNoise();window.addEventListener('resize',resizeNoise);}
function resizeNoise(){noiseW=Math.floor(window.innerWidth/4);noiseH=Math.floor(window.innerHeight/4);noiseCanvas.width=noiseW;noiseCanvas.height=noiseH;}
function renderNoise(){var img=noiseCtx.createImageData(noiseW,noiseH),d=img.data;for(var i=0;i<d.length;i+=4){var v=Math.random()*255;d[i]=v;d[i+1]=v;d[i+2]=v;d[i+3]=255;}noiseCtx.putImageData(img,0,0);}
function startNoise(fps){noiseInterval=setInterval(renderNoise,Math.max(33,Math.floor(1000/fps)));}
function stopNoise(){if(noiseInterval){clearInterval(noiseInterval);noiseInterval=null;}}
function triggerScreenTear(){var y=Math.random()*100,dx=(Math.random()-.5)*30;screenTear.style.top=y+'%';screenTear.style.transform='translateX('+dx+'px)';screenTear.style.opacity='0.8';setTimeout(function(){screenTear.style.opacity='0';},80+Math.random()*120);}
function triggerInvertFlash(){crt.classList.add('invert-flash');setTimeout(function(){crt.classList.remove('invert-flash');},150);}
function triggerBrightnessFlash(){crt.style.filter='brightness(4)';setTimeout(function(){crt.style.filter='';},60);}
function setPhase(p){if(p===currentPhase)return;currentPhase=p;switch(p){case 1:case 2:root.style.setProperty('--term-color','#00ff41');root.style.setProperty('--term-glow','rgba(0,255,65,0.5)');root.style.setProperty('--term-dim','rgba(0,255,65,0.25)');root.style.setProperty('--warp-opacity','0');root.style.setProperty('--flicker-dur','0s');crt.classList.remove('flickering');cursorEl.classList.remove('corrupted');noiseCanvas.style.opacity='.04';break;case 3:root.style.setProperty('--term-color','#ffaa00');root.style.setProperty('--term-glow','rgba(255,170,0,0.5)');root.style.setProperty('--term-dim','rgba(255,170,0,0.25)');root.style.setProperty('--warp-opacity','0.15');root.style.setProperty('--flicker-dur','8s');crt.classList.add('flickering');noiseCanvas.style.opacity='.06';glitchIntervals.push(setInterval(function(){if(Math.random()<.4)triggerScreenTear();},3000));break;case 4:root.style.setProperty('--term-color','#ff5500');root.style.setProperty('--term-glow','rgba(255,85,0,0.6)');root.style.setProperty('--term-dim','rgba(255,85,0,0.3)');root.style.setProperty('--warp-opacity','0.35');root.style.setProperty('--flicker-dur','4s');noiseCanvas.style.opacity='.08';glitchIntervals.push(setInterval(function(){if(Math.random()<.6)triggerScreenTear();},1500));glitchIntervals.push(setInterval(function(){if(Math.random()<.3)triggerBrightnessFlash();},4000));break;case 5:root.style.setProperty('--term-color','#ff0040');root.style.setProperty('--term-glow','rgba(255,0,64,0.7)');root.style.setProperty('--term-dim','rgba(255,0,64,0.35)');root.style.setProperty('--warp-opacity','0.6');root.style.setProperty('--flicker-dur','2s');cursorEl.classList.add('corrupted');noiseCanvas.style.opacity='.12';glitchIntervals.push(setInterval(function(){triggerScreenTear();if(Math.random()<.3)setTimeout(triggerScreenTear,50+Math.random()*100);},800));glitchIntervals.push(setInterval(function(){if(Math.random()<.5)triggerBrightnessFlash();},2000));stopNoise();startNoise(20);break;case 6:root.style.setProperty('--warp-opacity','0.75');root.style.setProperty('--flicker-dur','3s');noiseCanvas.style.opacity='.1';glitchIntervals.push(setInterval(function(){if(Math.random()<.4)triggerScreenTear();},2000));break;}}
function setCorruptedState(){root.style.setProperty('--term-color','#ff0040');root.style.setProperty('--term-glow','rgba(255,0,64,0.7)');root.style.setProperty('--term-dim','rgba(255,0,64,0.35)');root.style.setProperty('--warp-opacity','0.55');root.style.setProperty('--flicker-dur','3s');crt.classList.add('flickering');noiseCanvas.style.opacity='.08';cursorEl.classList.add('corrupted');}
function wait(ms){return new Promise(function(r){setTimeout(r,ms);})}
function scrollPage(p){if(p)p.scrollTop=p.scrollHeight;}

async function typeLine(te,ld){var text=ld.text,speed=ld.speed||20,style=ld.style,phase=ld.phase,scramble=ld.scramble,event=ld.event,pd=te.closest('.page');if(event==='flash'){triggerBrightnessFlash();triggerScreenTear();await wait(300);}if(event==='invert'){triggerInvertFlash();await wait(400);}if(text===''){await wait(500);te.appendChild(document.createElement('br'));scrollPage(pd);return;}if(phase)setPhase(phase);var sp=document.createElement('span');sp.className='t-line';if(style)sp.classList.add(style);if(scramble)sp.classList.add('scramble');te.appendChild(sp);for(var i=0;i<text.length;i++){if(typingAbort){typingAbort=false;return;}var ch=text[i];if(phase>=4&&Math.random()<.12){sp.textContent+=rgc();scrollPage(pd);await wait(speed*2.5+Math.random()*speed*2);sp.textContent=sp.textContent.slice(0,-1);await wait(speed*1.5);}if(Math.random()<.05)await wait(speed*3);sp.textContent+=ch;scrollPage(pd);await wait(speed+Math.random()*speed*.4);}te.appendChild(document.createElement('br'));scrollPage(pd);}
function cleanupGlitches(){stopNoise();glitchIntervals.forEach(clearInterval);glitchIntervals=[];if(postGlitchInterval){clearInterval(postGlitchInterval);postGlitchInterval=null;}if(archiveGlitchInterval){clearInterval(archiveGlitchInterval);archiveGlitchInterval=null;}if(carteGlitchInterval){clearInterval(carteGlitchInterval);carteGlitchInterval=null;}if(transPostInterval){clearInterval(transPostInterval);transPostInterval=null;}}
function fullCleanup(){cleanupGlitches();currentPhase=0;crt.classList.remove('flickering','invert-flash');crt.style.filter='';cursorEl.classList.remove('corrupted');root.style.setProperty('--term-color','#00ff41');root.style.setProperty('--term-glow','rgba(0,255,65,0.5)');root.style.setProperty('--term-dim','rgba(0,255,65,0.25)');root.style.setProperty('--warp-opacity','0');root.style.setProperty('--flicker-dur','0s');noiseCanvas.style.opacity='.04';}
function buildNav(){navBar.innerHTML='';var keys=Object.keys(PAGES);for(var i=0;i<keys.length;i++){var key=keys[i],pg=PAGES[key],lk=document.createElement('div');lk.className='nav-link';lk.setAttribute('data-page',key);lk.setAttribute('role','button');lk.setAttribute('tabindex','0');lk.innerHTML='<i class="fas '+pg.icon+'"></i> '+pg.label;lk.addEventListener('click',function(){navigateTo(this.getAttribute('data-page'));});lk.addEventListener('keydown',function(e){if(e.key==='Enter')navigateTo(this.getAttribute('data-page'));});navBar.appendChild(lk);}}
function showNav(){navBar.classList.add('visible');}
function updateActiveNav(){var links=navBar.querySelectorAll('.nav-link');for(var i=0;i<links.length;i++){if(links[i].getAttribute('data-page')===currentPageName)links[i].classList.add('active');else links[i].classList.remove('active');}}
function navigateTo(pn){if(!PAGES[pn]||pn===currentPageName)return;typingAbort=true;cleanupGlitches();triggerBrightnessFlash();triggerScreenTear();setTimeout(function(){var pages=document.querySelectorAll('.page');for(var i=0;i<pages.length;i++)pages[i].classList.remove('active');if(pn!=='accueil'){var oe=document.getElementById(pn+'-output');if(oe)oe.innerHTML='';}var tg=document.getElementById('page-'+pn);if(tg)tg.classList.add('active');currentPageName=pn;updateActiveNav();if(pn!=='accueil'){setCorruptedState();function navigateTo(pn){if(!PAGES[pn]||pn===currentPageName)return;typingAbort=true;cleanupGlitches();triggerBrightnessFlash();triggerScreenTear();setTimeout(function(){var pages=document.querySelectorAll('.page');for(var i=0;i<pages.length;i++)pages[i].classList.remove('active');if(pn!=='accueil'){var oe=document.getElementById(pn+'-output');if(oe)oe.innerHTML='';}var tg=document.getElementById('page-'+pn);if(tg)tg.classList.add('active');currentPageName=pn;updateActiveNav();typingAbort=false;if(pn!=='accueil'){setCorruptedState();startNoise(10);glitchIntervals.push(setInterval(function(){if(Math.random()<.25)triggerScreenTear();},3000));}PAGES[pn].init();},200);}
function initAccueil(){if(bootCompleted){fullCleanup();output.innerHTML='';startScreen.classList.remove('hidden');terminal.classList.add('hidden');navBar.classList.remove('visible');startNoise(8);return;}startScreen.classList.remove('hidden');terminal.classList.add('hidden');output.innerHTML='';navBar.classList.remove('visible');startNoise(8);}
async function startBootSequence(){if(isRunning)return;isRunning=true;if(bootCompleted){startScreen.classList.add('hidden');terminal.classList.remove('hidden');output.innerHTML='';setCorruptedState();startNoise(10);glitchIntervals.push(setInterval(function(){if(Math.random()<.3)triggerScreenTear();},3000));postGlitchInterval=setInterval(function(){if(Math.random()<.3)triggerScreenTear();if(Math.random()<.08){triggerInvertFlash();setTimeout(triggerBrightnessFlash,200);}},4000);showNav();isRunning=false;return;}startScreen.classList.add('hidden');terminal.classList.remove('hidden');output.innerHTML='';startNoise(12);for(var i=0;i<BOOT_SEQUENCE.length;i++){if(typingAbort){isRunning=false;return;}await typeLine(output,BOOT_SEQUENCE[i]);}bootCompleted=true;localStorage.setItem('cog_boot_done','1');isRunning=false;postGlitchInterval=setInterval(function(){if(Math.random()<.3)triggerScreenTear();if(Math.random()<.08){triggerInvertFlash();setTimeout(triggerBrightnessFlash,200);}},4000);setInterval(function(){if(Math.random()<.2){var ls=output.querySelectorAll('.t-line.corrupted,.t-line.whisper');if(ls.length>0){var t=ls[Math.floor(Math.random()*ls.length)];t.style.opacity='0';setTimeout(function(){t.style.opacity='1';},80);setTimeout(function(){t.style.opacity='.2';},160);setTimeout(function(){t.style.opacity='1';},240);}}},5000);showNav();}
async function initArchives(){var out=document.getElementById('archives-output');if(!out)return;var sq=[{text:LL,speed:8,style:'corrupted'},{text:'  ARCHIVES DU COGITATEUR \u2014 FER-DOULEUR',speed:12,style:'corrupted'},{text:'  R\u00C9CUP\u00C9RATION DE DONN\u00C9ES EN COURS...',speed:14,style:'corrupted'},{text:LL,speed:8,style:'corrupted'},{text:'',speed:10},{text:'  AVERTISSEMENT : INTEGRIT\u00C9 DES FICHIERS COMPROMISE.',speed:18,style:'warning'},{text:'  Certaines donn\u00E9es ont \u00E9t\u00E9 alt\u00E9r\u00E9es par des sources externes.',speed:20,style:'warning'},{text:'',speed:10}];for(var i=0;i<sq.length;i++){if(typingAbort)return;await typeLine(out,sq[i]);}var files=[{name:'journal_bord_738.M41',dots:' ............... ',status:'CORROMPU',cls:'corrupted'},{name:'registre_equipage_alpha.M41',dots:' ......... ',status:'FRAGMENT\u00C9',cls:'fragmented'},{name:'cartes_warp_secteur_9.M41',dots:' ........... ',status:'ILLISIBLE',cls:'corrupted'},{name:'transmission_imperiale_412.M41',dots:' ......... ',status:'INTACT \u25C8 ANOMALIE',cls:'anomaly'},{name:'mantra_purification_ORDO_MALLEUS',dots:' ...... ',status:'CORROMPU',cls:'corrupted'},{name:'coordonnees_gorgon_prime.M41',dots:' ........ ',status:'EFFAC\u00C9',cls:'erased'},{name:'rapport_expedition_abyss.M41',dots:' ......... ',status:'FRAGMENT\u00C9',cls:'fragmented'},{name:'fidelite_imperiale_journal.VOX',dots:' .......... ',status:'INTACT \u25C8 ANOMALIE',cls:'anomaly'},{name:'scan_bouclier_vide_739.M41',dots:' .......... ',status:'CORROMPU',cls:'corrupted'},{name:'manifeste_cargaison_xeno.M41',dots:' ........ ',status:'ILLISIBLE',cls:'corrupted'}];for(var f=0;f<files.length;f++){if(typingAbort)return;var file=files[f],en=document.createElement('div');en.className='file-entry';var ns=document.createElement('span');ns.className='file-name';ns.textContent='\u25B8 '+file.name+file.dots;var ss=document.createElement('span');ss.className='file-status '+file.cls;ss.textContent=file.status;en.appendChild(ns);en.appendChild(ss);out.appendChild(en);await wait(120+Math.random()*80);}out.appendChild(document.createElement('br'));var mg=document.createElement('span');mg.className='t-line whisper';mg.textContent='[LE COGITATEUR TENTE DE R\u00C9CUP\u00C9RER LES DONN\u00C9ES RESTANTES...]';out.appendChild(mg);out.appendChild(document.createElement('br'));archiveGlitchInterval=setInterval(function(){var es=out.querySelectorAll('.file-entry');if(es.length>0){var tg=es[Math.floor(Math.random()*es.length)];tg.classList.add('glitch-flash');setTimeout(function(){tg.classList.remove('glitch-flash');},100);}},2500);}
async function initCarte(){var out=document.getElementById('carte-output');if(!out)return;var sq=[{text:LL,speed:8,style:'corrupted'},{text:'  CARTOGRAPHIE WARP \u2014 VORTEX HURLANT',speed:12,style:'corrupted'},{text:LL,speed:8,style:'corrupted'},{text:'',speed:10},{text:'  COORDONN\u00C9ES WARP : [INSTABLES]',speed:20,style:'error'},{text:'  POSITION R\u00C9ELLE   : [IND\u00C9TERMIN\u00C9E]',speed:20,style:'error'},{text:'  FLUX DU VORTEX   : [CRITIQUE]',speed:20,style:'error'},{text:'',speed:10},{text:'LE VORTEX HURLANT NE SE LAISSE PAS CARTOGRAPHIER.',speed:30,style:'corrupted'},{text:'IL N\u2019Y A PAS DE CARTE. IL N\u2019Y A QUE DES \u00C9CHOS DE SOUFFRANCE.',speed:30,style:'corrupted'},{text:'',speed:10}];for(var i=0;i<sq.length;i++){if(typingAbort)return;await typeLine(out,sq[i]);}var gc='\u00B7\u2591\u2592\u2593\u2588\u2584\u2580\u258C\u2590',gw=48,gh=12,gd=document.createElement('div');gd.className='warp-grid';var gt='';for(var r=0;r<gh;r++){var ln='';for(var c=0;c<gw;c++){if(Math.random()<.15)ln+=gc[Math.floor(Math.random()*gc.length)];else ln+='\u00B7';}gt+=ln+'\n';}gd.textContent=gt;gd.style.whiteSpace='pre';out.appendChild(gd);out.appendChild(document.createElement('br'));var m1=document.createElement('span');m1.className='t-line error';m1.textContent='  SIGNAL WARP : \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2591\u2591 INSTABLE';out.appendChild(m1);out.appendChild(document.createElement('br'));var m2=document.createElement('span');m2.className='t-line whisper';m2.textContent='  [LES DONN\u00C9ES REFUSENT DE SE STABILISER \u2014 LE VORTEX PARLE]';out.appendChild(m2);out.appendChild(document.createElement('br'));carteGlitchInterval=setInterval(function(){if(!gd.parentNode)return;var ls=gt.split('\n'),ri=Math.floor(Math.random()*(ls.length-1)),ci=Math.floor(Math.random()*(ls[ri].length-1));if(ls[ri]){var ar=ls[ri].split('');ar[ci]=gc[Math.floor(Math.random()*gc.length)];ls[ri]=ar.join('');gd.textContent=ls.join('\n');}},150);}
async function initTransmission(){if(transmissionDone){var out=document.getElementById('transmission-output');if(out)out.innerHTML='<span class="t-line dim">[TRANSMISSION D\u00C9J\u00C0 LUE. ACC\u00C9DER AUX ARCHIVES POUR LES DONN\u00C9ES R\u00C9SIDUELLES.]</span><br>';return;}var out=document.getElementById('transmission-output');if(!out)return;var transPhase=0;for(var i=0;i<TRANS_SEQ.length;i++){if(typingAbort){transmissionDone=true;return;}var ld=TRANS_SEQ[i];if(i>60&&transPhase<1){transPhase=1;root.style.setProperty('--term-color','#ffaa00');root.style.setProperty('--term-glow','rgba(255,170,0,0.5)');root.style.setProperty('--warp-opacity','0.1');crt.classList.add('flickering');root.style.setProperty('--flicker-dur','6s');glitchIntervals.push(setInterval(function(){if(Math.random()<.2)triggerScreenTear();},4000));}if(i>90&&transPhase<2){transPhase=2;root.style.setProperty('--term-color','#ff5500');root.style.setProperty('--term-glow','rgba(255,85,0,0.6)');root.style.setProperty('--warp-opacity','0.25');root.style.setProperty('--flicker-dur','4s');noiseCanvas.style.opacity='.07';}if(i>120&&transPhase<3){transPhase=3;root.style.setProperty('--term-color','#ff0040');root.style.setProperty('--term-glow','rgba(255,0,64,0.7)');root.style.setProperty('--warp-opacity','0.55');root.style.setProperty('--flicker-dur','2s');cursorEl.classList.add('corrupted');noiseCanvas.style.opacity='.1';stopNoise();startNoise(18);glitchIntervals.push(setInterval(function(){triggerScreenTear();},1000));glitchIntervals.push(setInterval(function(){if(Math.random()<.4)triggerBrightnessFlash();},2500));}if(i>145&&transPhase<4){transPhase=4;root.style.setProperty('--warp-opacity','0.8');noiseCanvas.style.opacity='.14';}await typeLine(out,ld);}transmissionDone=true;transPostInterval=setInterval(function(){if(Math.random()<.35)triggerScreenTear();if(Math.random()<.1){triggerInvertFlash();setTimeout(triggerBrightnessFlash,200);}},3500);setInterval(function(){if(Math.random()<.15){var ls=out.querySelectorAll('.t-line.massive');if(ls.length>0){var t=ls[Math.floor(Math.random()*ls.length)];t.style.opacity='0';setTimeout(function(){t.style.opacity='1';},60);setTimeout(function(){t.style.opacity='.15';},120);setTimeout(function(){t.style.opacity='1';},180);}}},4000);showNav();}
